<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ColorMatch</title>
</head>
<body onload="Run()">
    <div id="TrueColor">
        <p id="counter">5</p>
    </div>

    <div id="PlayerColor">


        <div id="Choosing"> 
          <div class="block"><input id="Red" class="slider" type="range" min="0" max="255" value="0"></div>
          <div class="block"><input id="Green" class="slider" type="range" min="0" max="255" value="0"></div>
          <div class="block"><input id="Blue" class="slider" type="range" min="0" max="255" value="0"></div>
        </div>
        <div id="Display">
            <p id="Tick"></p>
            <h2 id="txt">Your Color</h2>
            <div id="CompareDiv">
                <h2 id="PCtxt">Computer's Color</h2>
            </div>
        </div>

        <div id="MessageBg">
            <div id="MessageDiv">
                <h1 id="Procentage"></h1>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
